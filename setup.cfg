[flake8]
# can't change constants here, must address the problem, not hide it
accept-encodings = utf-8
max-complexity = 7
max-line-length = 120
max-local-variables = 5
max-module-members = 7
max-arguments = 5
max-cognitive-score = 10
max-imports = 12
max-methods = 7
max-returns = 5

exclude = .git, .venv, tests/golden/

ignore =
    # WPS306 - must inherit from object
    WPS306,
    # W503 - operator at start of line is current PEP8 recommendation (conflicts with W504)
    W503,
    # WPS358 - "float zero": the only fix is writing `0.` instead of `0.0`, which
    # is less readable. Pure style, no value-adding fix.
    WPS358,
    # WPS226 - repeated string literals are overwhelmingly dict keys in the
    # serializers/response builders; inline keys read better than extracted consts.
    WPS226,
    # WPS410/WPS412 - package __init__.py files legitimately re-export their public
    # API and declare __all__; that is their purpose, not stray "logic".
    WPS410,
    WPS412,


per-file-ignores =
    # Tests: relaxed for readability/intent. Structural rules stay enforced
    # (WPS110/202/211/221/301/404/218 kept; WPS459 fixed via pytest.approx).
    # S101 assert; WPS111/114/118 names; WPS432 magic numbers; WPS435 list-multiply.
    tests/*: S101, WPS111, WPS114, WPS118, WPS432, WPS435
    # config/ dataclass fields are UPPER_CASE to mirror the OmegaConf / YAML
    # override keys (renaming them would break config loading and user overrides).
    src/bar_scheduler/config/*.py: WPS115, WPS114
    # user_store.py is a god class pending a split into focused stores
    # (backlog: Cleaner Code #1). Its structural debt is tracked there.
    src/bar_scheduler/io/user_store.py: WPS214, WPS210, WPS231, WPS338, WPS204, WPS220, WPS615, WPS229
