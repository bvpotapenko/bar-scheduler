[flake8]
accept-encodings = utf-8
max-complexity = 7
max-line-length = 120
max-local-variables = 11
max-module-members = 16

max-imports = 17
max-methods = 14

exclude = .git, .venv

ignore =
    # WPS306 - must inherit from object
 WPS306, 
    # WPS324 - inconsistent return (bare return vs return None — valid in handlers)
    # W503 - operator at start of line is current PEP8 recommendation (conflicts with W504)
 W503


per-file-ignores =
    # S101 - ignore assert
    tests/*: S101
