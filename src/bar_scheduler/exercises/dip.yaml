exercise_id: dip
display_name: "Parallel Bar Dip"
muscle_group: upper_push

bw_fraction: 0.92
load_type: bw_plus_external

variants: [standard, chest_lean, tricep_upright]
primary_variant: standard
variant_factors:
  standard: 1.00
  chest_lean: 0.97
  tricep_upright: 1.03

has_variant_rotation: false

# Levels based on Strength Level database (4.8M+ lifts)
level_thresholds: [7, 19, 33]    # level 0 if ≤7, 1 if ≤19, 2 if ≤33, 3 if >33

# Per-set rep decay at ~RIR 2, 2-3 min rest (PMC11057609)
set_fatigue_curve: [1.0, 0.85, 0.75, 0.68, 0.63]

session_params:
  S:
    reps_fraction_low: 0.35
    reps_fraction_high: 0.55
    reps_min: 3
    reps_max: 8
    rest_min: 180
    rest_max: 300
    rir_target: 2
    sets_by_level: [1, 2, 3, 4]
  H:
    reps_fraction_low: 0.55
    reps_fraction_high: 0.75
    reps_min: 6
    reps_max: 15
    rest_min: 120
    rest_max: 180
    rir_target: 2
    sets_by_level: [2, 3, 4, 5]
  E:
    reps_fraction_low: 0.35
    reps_fraction_high: 0.55
    reps_min: 3
    reps_max: 10
    sets_min: 5
    sets_max: 8
    rest_min: 45
    rest_max: 90
    rir_target: 3
  T:
    reps_fraction_low: 0.20
    reps_fraction_high: 0.40
    reps_min: 2
    reps_max: 5
    rest_min: 60
    rest_max: 120
    rir_target: 5
    sets_by_level: [3, 4, 5, 6]
  TEST:
    reps_fraction_low: 1.0
    reps_fraction_high: 1.0
    reps_min: 1
    reps_max: 80
    sets_min: 1
    sets_max: 1
    rest_min: 180
    rest_max: 300
    rir_target: 0

target_metric: max_reps
target_value: 40.0

test_protocol: |
  DIP MAX REP TEST
  Warm-up: 2 min arm swings, 10 light push-ups, 1 set of 5 easy dips, rest 2 min.
  Test: arms locked out at top, lower until upper arm parallel to floor, press to lockout.
  No bouncing. Count clean reps only.
  Log as: --exercise dip --session-type TEST --sets 'N@0/180'
test_frequency_weeks: 3

onerm_includes_bodyweight: true
onerm_explanation: >
  Your dip 1RM includes your bodyweight (x0.92 BW fraction).
  If you weigh 82 kg and do 1 dip with +30 kg, effective load = 0.92x82 + 30 = 105.4 kg.
  Formula: 1RM = (BWx0.92 + added_weight) x (1 + reps/30)  [Epley].

weight_increment_fraction: 0.012
weight_tm_threshold: 12
max_added_weight_kg: 30.0

default_item: PARALLEL_BARS

equipment:
  PARALLEL_BARS:
    label: "Parallel bars (bodyweight)"
    assistance_kg: 0.0
    requires_weight_declaration: false
  BAND_SET:
    label: "Resistance bands (enter your available band resistances in kg)"
    assistance_kg: null
    requires_weight_declaration: true
  MACHINE_ASSISTED:
    label: "Assisted dip machine (direct kg offset)"
    assistance_kg: null
    requires_weight_declaration: true
  WEIGHT_BELT:
    label: "Weight belt / vest (for added load)"
    assistance_kg: 0.0
    requires_weight_declaration: false
